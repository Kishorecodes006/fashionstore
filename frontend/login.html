<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - SwiftCart</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      min-height: 100vh;
      background:
        linear-gradient(120deg, rgba(184,234,220,0.95), rgba(255,255,255,0.85)),
        radial-gradient(circle at top right, rgba(255,139,107,0.45), transparent 35%);
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 25px;
    }

    .login-card {
      width: 100%;
      max-width: 430px;
      background: white;
      border-radius: 14px;
      padding: 32px;
      box-shadow: 0 24px 70px rgba(22,33,31,0.14);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 900;
      font-size: 24px;
      color: #16211f;
      text-decoration: none;
      margin-bottom: 25px;
    }

    .brand span {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      background: #16211f;
      color: white;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    h1 {
      font-weight: 900;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #65726f;
      margin-bottom: 25px;
    }

    .form-control {
      height: 48px;
      border-radius: 8px;
    }

    .input-group-text {
      border-radius: 8px 0 0 8px;
    }

    .btn-dark {
      height: 48px;
      border-radius: 8px;
      font-weight: 800;
    }

    .btn-dark:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .links {
      display: flex;
      justify-content: space-between;
      margin-top: 18px;
      font-size: 14px;
    }

    .links a {
      text-decoration: none;
      font-weight: 700;
      color: #0f766e;
    }

    #message {
      margin-top: 15px;
      font-size: 14px;
      font-weight: 700;
      padding: 10px 12px;
      border-radius: 6px;
      display: none;
    }

    #message.show {
      display: block;
    }

    .spinner-border {
      width: 1.2rem;
      height: 1.2rem;
      margin-right: 8px;
    }
  </style>
</head>
<body>

<section class="login-card">
  <a href="index.html" class="brand">
    <span><i class="bi bi-bag-check-fill"></i></span>
    SwiftCart
  </a>

  <h1>Login</h1>
  <p class="subtitle">Enter your email and password to continue shopping.</p>

  <form id="loginForm">
    <div class="input-group mb-3">
      <span class="input-group-text"><i class="bi bi-envelope"></i></span>
      <input type="email" id="email" class="form-control" placeholder="Email address" required>
    </div>

    <div class="input-group mb-3">
      <span class="input-group-text"><i class="bi bi-lock"></i></span>
      <input type="password" id="password" class="form-control" placeholder="Password" required>
    </div>

    <div class="form-check mb-3">
      <input class="form-check-input" type="checkbox" id="remember">
      <label class="form-check-label" for="remember">Remember me</label>
    </div>

    <button type="submit" id="submitBtn" class="btn btn-dark w-100">
      <span class="spinner-border spinner-border-sm d-none" id="spinner" role="status"></span>
      <span id="btnText">Login</span>
    </button>
  </form>

  <div id="message"></div>

  <div class="links">
    <a href="register.html">Create account</a>
    <a href="products.html">Continue as guest</a>
  </div>
</section>

<script>
  const API_URL = 'http://localhost:8080';

  document.getElementById("loginForm").addEventListener("submit", async function(event) {
    event.preventDefault();

    const email     = document.getElementById("email").value.trim();
    const password  = document.getElementById("password").value.trim();
    const submitBtn = document.getElementById("submitBtn");
    const btnText   = document.getElementById("btnText");
    const spinner   = document.getElementById("spinner");

    if (!email || !password) {
      showMessage("Please enter email and password.", "danger");
      return;
    }

    if (password.length < 4) {
      showMessage("Password must contain at least 4 characters.", "danger");
      return;
    }

    // Show loading
    submitBtn.disabled = true;
    btnText.textContent = 'Logging in...';
    spinner.classList.remove('d-none');

    try {
      const response = await fetch(`${API_URL}/api/users/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      const data = await response.json();

      if (response.ok && data.id) {
        // Save user to localStorage
        localStorage.setItem('fs_user', JSON.stringify({
          id: data.id,
          name: data.name,
          email: data.email,
          phone: data.phone,
          address: data.address
        }));

        showMessage("✓ Login successful! Redirecting...", "success");

        setTimeout(() => {
          window.location.href = "products.html";
        }, 900);

      } else {
        showMessage("✗ " + (data.error || "Invalid email or password!"), "danger");
        resetBtn();
      }

    } catch (error) {
      console.error('Login error:', error);
      showMessage("✗ Connection error. Please check if the server is running.", "danger");
      resetBtn();
    }

    function resetBtn() {
      submitBtn.disabled = false;
      btnText.textContent = 'Login';
      spinner.classList.add('d-none');
    }
  });

  function showMessage(text, type) {
    const msg = document.getElementById("message");
    msg.textContent = text;
    msg.className = `show alert alert-${type}`;
    msg.style.display = 'block';
  }
</script>

</body>
</html>
