<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Products - SwiftCart</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f7faf8; font-family: Arial, Helvetica, sans-serif; color: #16211f; }
    .navbar { background: white; box-shadow: 0 8px 25px rgba(0,0,0,0.06); }
    .navbar-brand { font-weight: 900; }
    .page-header { background: linear-gradient(120deg, #b8eadc, #ffffff); padding: 55px 0; border-bottom: 1px solid #dbe4e1; }
    .page-header h1 { font-size: 46px; font-weight: 900; }
    .page-header p { color: #65726f; max-width: 600px; }
    .filter-box { background: white; border-radius: 12px; padding: 18px; box-shadow: 0 10px 30px rgba(0,0,0,0.06); margin-bottom: 25px; }
    .product-card { background: white; border-radius: 12px; padding: 18px; height: 100%; box-shadow: 0 14px 40px rgba(0,0,0,0.08); transition: 0.2s; }
    .product-card:hover { transform: translateY(-5px); }
    .product-img { height: 170px; background: linear-gradient(145deg, #b8eadc, #f7c948); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 64px; margin-bottom: 16px; overflow: hidden; }
    .product-img img { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; }
    .product-card h4 { font-weight: 900; font-size: 20px; }
    .product-card p { color: #65726f; min-height: 48px; }
    .price { font-weight: 900; font-size: 22px; margin-bottom: 14px; }
    .original-price { text-decoration: line-through; color: #aaa; font-size: 15px; font-weight: 400; margin-left: 8px; }
    .discount-badge { background: #fee2e2; color: #b91c1c; padding: 3px 8px; border-radius: 999px; font-size: 12px; font-weight: 800; margin-left: 8px; }
    .badge-category { background: #dcfce7; color: #166534; padding: 6px 10px; border-radius: 999px; font-size: 12px; font-weight: 800; }
    .stock-badge { font-size: 12px; font-weight: 700; padding: 3px 8px; border-radius: 999px; }
    .in-stock { background: #dcfce7; color: #166534; }
    .out-stock { background: #fee2e2; color: #b91c1c; }
    .skeleton { background: linear-gradient(90deg, #e8e8e8 25%, #f5f5f5 50%, #e8e8e8 75%); background-size: 200% 100%; animation: shimmer 1.2s infinite; border-radius: 8px; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    footer { margin-top: 50px; background: #16211f; color: white; padding: 25px 0; }
    #toast-wrap { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
    .toast-msg { background: #16211f; color: white; padding: 12px 20px; border-radius: 8px; font-weight: 700; font-size: 14px; box-shadow: 0 8px 25px rgba(0,0,0,0.2); animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top">
  <div class="container">
    <a class="navbar-brand" href="index.html"><i class="bi bi-bag-check-fill me-2"></i>SwiftCart</a>
    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav"><span class="navbar-toggler-icon"></span></button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto align-items-center">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link active" href="products.html">Products</a></li>
        <li class="nav-item">
          <a class="nav-link" href="cart.html">
            <i class="bi bi-cart3"></i> Cart
            <span class="badge bg-dark ms-1" id="cart-count">0</span>
          </a>
        </li>
        <li class="nav-item"><a class="nav-link" href="order-tracking.html">Track Order</a></li>
        <li class="nav-item" id="navAuthItem"><a class="nav-link" href="login.html">Login</a></li>
      </ul>
    </div>
  </div>
</nav>

<header class="page-header">
  <div class="container">
    <h1>Products</h1>
    <p>Browse products, search by name, filter by category and add items to your shopping cart.</p>
  </div>
</header>

<main class="container py-5">
  <div class="filter-box">
    <div class="row g-3">
      <div class="col-md-8">
        <input type="text" id="searchInput" class="form-control" placeholder="Search products...">
      </div>
      <div class="col-md-4">
        <select id="categoryFilter" class="form-select">
          <option value="">All Categories</option>
        </select>
      </div>
    </div>
  </div>

  <div class="row g-4" id="productList">
    ${[1,2,3,4,5,6].map(() => `
      <div class="col-sm-6 col-lg-4">
        <div class="product-card">
          <div class="skeleton" style="height:170px;margin-bottom:16px;"></div>
          <div class="skeleton" style="height:20px;width:60%;margin-bottom:10px;"></div>
          <div class="skeleton" style="height:16px;margin-bottom:6px;"></div>
          <div class="skeleton" style="height:16px;width:80%;margin-bottom:14px;"></div>
          <div class="skeleton" style="height:40px;"></div>
        </div>
      </div>
    `).join('')}
  </div>

  <div id="noProducts" class="alert alert-warning d-none mt-3">No products found.</div>
</main>

<footer>
  <div class="container text-center">
    <p class="mb-0">© 2026 SwiftCart. Simple E-Commerce Project.</p>
  </div>
</footer>

<div id="toast-wrap"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const API_URL = 'http://localhost:8080/api';

  let allProducts = [];
  let allCategories = [];

  function getCart() { return JSON.parse(localStorage.getItem('fs_cart') || '[]'); }
  function saveCart(cart) { localStorage.setItem('fs_cart', JSON.stringify(cart)); updateCartBadge(); }
  function updateCartBadge() {
    const total = getCart().reduce((s, i) => s + i.qty, 0);
    document.querySelectorAll('#cart-count').forEach(el => el.textContent = total);
  }
  function addToCart(id, name, price, imageUrl, category) {
    const cart = getCart();
    const existing = cart.find(i => i.id === id);
    if (existing) existing.qty++;
    else cart.push({ id, name, price, img: imageUrl || '', cat: category || '', qty: 1 });
    saveCart(cart);
    showToast('✅ ' + name + ' added to cart!');
  }

  function showToast(msg) {
    const wrap = document.getElementById('toast-wrap');
    const t = document.createElement('div');
    t.className = 'toast-msg';
    t.textContent = msg;
    wrap.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  function updateNav() {
    const user = JSON.parse(localStorage.getItem('fs_user') || 'null');
    const navItem = document.getElementById('navAuthItem');
    if (user) {
      navItem.innerHTML = `
        <div class="nav-link d-flex align-items-center gap-2">
          <a href="profile.html" style="font-weight:800; color:#16211f; text-decoration:none;">
            <i class="bi bi-person-circle me-1"></i>${user.name}
          </a>
          <button class="btn btn-sm btn-outline-dark" onclick="logout()">Logout</button>
        </div>`;
    }
  }
  function logout() {
    localStorage.removeItem('fs_user');
    window.location.href = 'login.html';
  }

  function renderProducts(list) {
    const grid = document.getElementById('productList');
    const noMsg = document.getElementById('noProducts');

    if (list.length === 0) {
      grid.innerHTML = '';
      noMsg.classList.remove('d-none');
      return;
    }
    noMsg.classList.add('d-none');

    grid.innerHTML = list.map(p => {
      const discountedPrice = p.discount ? Math.round(p.price - (p.price * p.discount / 100)) : p.price;
      const imgHtml = p.imageUrl
        ? `<img src="${p.imageUrl}" alt="${p.name}" onerror="this.parentElement.innerHTML='<i class=\\'bi bi-box-seam\\'></i>'">`
        : `<i class="bi bi-box-seam"></i>`;
      const stockHtml = p.stock > 0
        ? `<span class="stock-badge in-stock">In Stock (${p.stock})</span>`
        : `<span class="stock-badge out-stock">Out of Stock</span>`;
      const priceHtml = p.discount
        ? `₹${discountedPrice} <span class="original-price">₹${p.price}</span><span class="discount-badge">${p.discount}% OFF</span>`
        : `₹${p.price}`;

      return `
        <div class="col-sm-6 col-lg-4">
          <div class="product-card">
            <div class="product-img">${imgHtml}</div>
            <div class="d-flex align-items-center gap-2 mb-2">
              <span class="badge-category">${p.category?.name || 'General'}</span>
              ${stockHtml}
            </div>
            <h4 class="mt-2">${p.name}</h4>
            <p>${p.description || ''}</p>
            <div class="price">${priceHtml}</div>
            <button class="btn btn-dark w-100"
              ${p.stock === 0 ? 'disabled' : ''}
              onclick="addToCart(${p.id}, '${p.name.replace(/'/g, "\\'")}', ${discountedPrice}, '${p.imageUrl || ''}', '${p.category?.name || ''}')">
              <i class="bi bi-cart-plus me-2"></i>${p.stock === 0 ? 'Out of Stock' : 'Add to Cart'}
            </button>
          </div>
        </div>`;
    }).join('');
  }

  function applyFilter() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const catId = document.getElementById('categoryFilter').value;
    const filtered = allProducts.filter(p => {
      const matchSearch = p.name.toLowerCase().includes(search) || (p.description || '').toLowerCase().includes(search);
      const matchCat = !catId || String(p.category?.id) === catId;
      return matchSearch && matchCat;
    });
    renderProducts(filtered);
  }

  async function loadCategories() {
    try {
      const res = await fetch(`${API_URL}/categories`);
      const cats = await res.json();
      allCategories = cats;
      const sel = document.getElementById('categoryFilter');
      cats.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.id;
        opt.textContent = c.name;
        sel.appendChild(opt);
      });
    } catch (e) { console.warn('Could not load categories:', e); }
  }

  async function loadProducts() {
    try {
      const res = await fetch(`${API_URL}/products`);
      if (!res.ok) throw new Error('Failed to fetch products');
      allProducts = await res.json();
      renderProducts(allProducts);
    } catch (e) {
      console.error('Error loading products:', e);
      document.getElementById('productList').innerHTML = `
        <div class="col-12">
          <div class="alert alert-danger">
            ❌ Could not load products. Make sure the backend is running at <strong>localhost:8080</strong>.
          </div>
        </div>`;
    }
  }

  document.getElementById('searchInput').addEventListener('input', applyFilter);
  document.getElementById('categoryFilter').addEventListener('change', applyFilter);

  updateCartBadge();
  updateNav();
  loadCategories();
  loadProducts();
</script>
</body>
</html>
