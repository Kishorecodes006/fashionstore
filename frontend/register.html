<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register - SwiftCart</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      min-height: 100vh;
      background:
        linear-gradient(120deg, rgba(184,234,220,0.95), rgba(255,255,255,0.88)),
        radial-gradient(circle at top right, rgba(255,139,107,0.42), transparent 35%);
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 25px;
    }

    .register-card {
      width: 100%;
      max-width: 500px;
      background: white;
      border-radius: 14px;
      padding: 32px;
      box-shadow: 0 24px 70px rgba(22,33,31,0.14);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 900;
      font-size: 24px;
      color: #16211f;
      text-decoration: none;
      margin-bottom: 25px;
    }

    .brand span {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      background: #16211f;
      color: white;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    h1 {
      font-weight: 900;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #65726f;
      margin-bottom: 25px;
    }

    .form-control {
      height: 48px;
      border-radius: 8px;
    }

    textarea.form-control {
      height: auto;
    }

    .input-group-text {
      border-radius: 8px 0 0 8px;
    }

    .btn-dark {
      height: 48px;
      border-radius: 8px;
      font-weight: 800;
    }

    .btn-dark:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #message {
      margin-top: 15px;
      font-size: 14px;
      font-weight: 700;
      padding: 12px;
      border-radius: 6px;
      display: none;
    }

    #message.show {
      display: block;
    }

    .spinner-border {
      width: 1.2rem;
      height: 1.2rem;
      margin-right: 8px;
    }

    .bottom-link {
      text-align: center;
      margin-top: 18px;
      font-size: 14px;
    }

    .bottom-link a {
      text-decoration: none;
      font-weight: 700;
      color: #0f766e;
    }
  </style>
</head>
<body>

<section class="register-card">
  <a href="index.html" class="brand">
    <span><i class="bi bi-bag-check-fill"></i></span>
    SwiftCart
  </a>

  <h1>Create Account</h1>
  <p class="subtitle">Register to shop products and track your orders.</p>

  <form id="registerForm">
    <div class="input-group mb-3">
      <span class="input-group-text"><i class="bi bi-person"></i></span>
      <input type="text" id="name" class="form-control" placeholder="Full Name" required>
    </div>

    <div class="input-group mb-3">
      <span class="input-group-text"><i class="bi bi-envelope"></i></span>
      <input type="email" id="email" class="form-control" placeholder="Email Address" required>
    </div>

    <div class="input-group mb-3">
      <span class="input-group-text"><i class="bi bi-phone"></i></span>
      <input type="tel" id="phone" class="form-control" placeholder="Phone Number" required>
    </div>

    <div class="input-group mb-3">
      <span class="input-group-text"><i class="bi bi-lock"></i></span>
      <input type="password" id="password" class="form-control" placeholder="Password" required>
    </div>

    <textarea id="address" class="form-control mb-3" rows="3" placeholder="Address" required></textarea>

    <div class="form-check mb-3">
      <input class="form-check-input" type="checkbox" id="terms" required>
      <label class="form-check-label" for="terms">
        I agree to the terms and conditions
      </label>
    </div>

    <button type="submit" id="submitBtn" class="btn btn-dark w-100">
      <span id="spinner" class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
      <span id="btnText">Register</span>
    </button>
  </form>

  <div id="message"></div>

  <div class="bottom-link">
    Already have an account? <a href="login.html">Login here</a>
  </div>
</section>

<script>
  const API_URL = 'http://localhost:8080';

  document.getElementById("registerForm").addEventListener("submit", async function(event) {
    event.preventDefault();

    const name      = document.getElementById("name").value.trim();
    const email     = document.getElementById("email").value.trim();
    const phone     = document.getElementById("phone").value.trim();
    const password  = document.getElementById("password").value.trim();
    const address   = document.getElementById("address").value.trim();
    const submitBtn = document.getElementById("submitBtn");
    const btnText   = document.getElementById("btnText");
    const spinner   = document.getElementById("spinner");

    // Client-side validation
    if (!name || !email || !phone || !password || !address) {
      showMessage("Please fill all fields.", "danger");
      return;
    }

    if (phone.length < 10) {
      showMessage("Enter a valid phone number (at least 10 digits).", "danger");
      return;
    }

    if (password.length < 4) {
      showMessage("Password must contain at least 4 characters.", "danger");
      return;
    }

    // Show loading state
    submitBtn.disabled = true;
    btnText.classList.add('d-none');
    spinner.classList.remove('d-none');

    try {
      const response = await fetch(`${API_URL}/api/users/register`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ name, email, phone, password, address })
      });

      const data = await response.json();

      if (response.ok && data.id) {
        showMessage("✓ Registration successful! Redirecting to login...", "success");
        localStorage.setItem("user_id", data.id);
        localStorage.setItem("user_email", data.email);
        setTimeout(() => window.location.href = "login.html", 2000);
      } else {
        showMessage("✗ " + (data.error || "Registration failed. Please try again."), "danger");
        resetBtn();
      }

    } catch (error) {
      console.error('Error:', error);
      showMessage("✗ Connection error. Please check if the server is running.", "danger");
      resetBtn();
    }

    function resetBtn() {
      submitBtn.disabled = false;
      btnText.classList.remove('d-none');
      spinner.classList.add('d-none');
    }
  });

  function showMessage(text, type) {
    const messageDiv = document.getElementById("message");
    messageDiv.textContent = text;
    messageDiv.className = `show alert alert-${type}`;
    messageDiv.style.display = 'block';
  }
</script>

</body>
</html>
